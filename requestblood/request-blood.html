<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Request Form</title>
    <link rel="stylesheet" href="request-blood-style.css">
</head>
<body>

<div class="form-container">
    <header class="form-header">
        <h1>Blood Request Form</h1>
        <p>Submit your blood requirement details. We'll connect you with donors and blood banks.</p>
    </header>

    <form action="#" method="POST">
        
        <section class="form-section">
            <h2>Patient Information</h2>
            <div class="divider"></div>
            
            <div class="form-grid col-3">
                <div class="input-group">
                    <label>Patient Name *</label>
                    <input type="text" placeholder="Full name of patient" required>
                </div>
                <div class="input-group">
                    <label>Blood Group Required *</label>
                    <div class="select-wrapper">
                        <select required>
                            <option value="" disabled selected>Select Blood Group</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>Units Required (450ml each) *</label>
                    <input type="number" value="1" min="1" required>
                </div>
            </div>

            <div class="form-grid col-3 mt-15">
                <div class="input-group">
                    <label>Urgency Level *</label>
                    <div class="select-wrapper">
                        <select required>
                            <option value="normal" selected>Normal (within 7 days)</option>
                            <option value="urgent">Urgent (within 24-48 hours)</option>
                            <option value="critical">Critical (Immediate)</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <section class="form-section">
            <h2>Hospital Details</h2>
            <div class="divider"></div>
            
            <div class="form-grid col-1">
                <div class="input-group">
                    <label>Hospital Name *</label>
                    <input type="text" placeholder="Name of hospital" required>
                </div>
            </div>

            <div class="form-grid col-2 mt-15">
                <div class="input-group">
                    <label>City *</label>
                    <input type="text" placeholder="Hospital city" required>
                </div>
                <div class="input-group">
                    <label>Required By Date</label>
                    <input type="date" required>
                </div>
            </div>
        </section>

        <section class="form-section">
            <h2>Contact Information</h2>
            <div class="divider"></div>
            
            <div class="form-grid col-2">
                <div class="input-group">
                    <label>Contact Person Name *</label>
                    <input type="text" placeholder="Your name" required>
                </div>
                <div class="input-group">
                    <label>Phone Number *</label>
                    <input type="tel" placeholder="10-digit mobile number" required>
                </div>
            </div>

            <div class="form-grid col-1 mt-15">
                <div class="input-group">
                    <label>Reason for Requirement (Optional)</label>
                    <textarea rows="3" placeholder="Surgery, accident, medical condition, etc."></textarea>
                </div>
            </div>
        </section>

        <div class="submit-container">
            <button type="submit" class="submit-btn">
                Submit Blood Request
            </button>
        </div>

    </form>
</div>

</body>
</html>
